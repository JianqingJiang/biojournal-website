# Netlify 配置文件
# 文件路径: netlify.toml

[build]
  functions = "netlify/functions"
  publish = "."

# 定时任务：每天早上6点更新新闻（Netlify Event-triggered functions）
[[functions."fetch-news".schedules]]
  cron = "0 6 * * *"

# 重定向规则（可选）
[[redirects]]
  from = "/api/fetch-news"
  to = "/.netlify/functions/fetch-news"
  status = 200

# 头部配置
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
