# Netlify 配置文件
# 文件路径: netlify.toml

[build]
  functions = "netlify/functions"
  publish = "."

# 重定向规则
[[redirects]]
  from = "/api/fetch-news"
  to = "/.netlify/functions/fetch-news"
  status = 200

# 头部配置
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
